<head>

<header>

        <span class="bar"></span>

                <li><a href="index.html">Home</a></li>

<body>

    <div class="booking-card">
        <h2>Reserve A Table</h2>
        <p>Experience the art of fine dining</p>

        <form id="reservationForm">
            <div class="input-group">
                <input type="text" placeholder="Full Name" required>
            </div>

            <div class="input-row">
                <input type="date" min="2026-01-01" max="2026-12-31" required>
                <input type="time" required>
            </div>

            <div class="input-row">
                <select required>
                    <option value="" disabled selected>Guests</option>
                    <option value="1">1 Person</option>
                    <option value="2">2 People</option>
                    <option value="4">4 People</option>
                    <option value="6">6+ People</option>
                </select>
                <input type="tel" placeholder="Phone Number">
            </div>

            <div class="input-group">
                <span class="payment-label">Payment Method</span>
                <select id="paymentMethod" onchange="checkPayment()">
                    <option value="cash">Cash</option>
                    <option value="visa">Visa / Credit Card</option>
                </select>
            </div>

            <div id="visa-info">
                <div class="input-group">
                    <input type="text" placeholder="Card Number (16-digits)">
                </div>
                <div class="input-row">
                    <input type="text" placeholder="MM / YY">
                    <input type="text" placeholder="CVV">
                </div>
            </div>

            <div class="input-group">
                <textarea rows="2" placeholder="Special requirements..."></textarea>
            </div>

            <button type="submit" class="btn-book">Confirm Booking</button>
        </form>
    </div>

    <script>
        function checkPayment() {
            const method = document.getElementById('paymentMethod').value;
            const visaSection = document.getElementById('visa-info');
            
            if (method === 'visa') {
                visaSection.style.display = 'block';
            } else {
                visaSection.style.display = 'none';
            }
        }

        // كود تجريبي لمنع تحديث الصفحة عند الضغط على زر الحجز
        document.getElementById('reservationForm').onsubmit = function(e) {
            e.preventDefault();
            alert('Your table has been reserved successfully!');
        };
    </script>
    <script>// كود بيخلي أقل تاريخ متاح هو "النهاردة" وأقصى تاريخ هو آخر 2026
const dateInput = document.querySelector('input[type="date"]');
const today = new Date().toISOString().split('T')[0];
dateInput.setAttribute('min', today);
dateInput.setAttribute('max', '2026-12-31');</script>

</body>
</html>
